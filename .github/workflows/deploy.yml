name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Public Data (Schedule/Manual only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/fetch-public-data.js
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Generate Blog Post (Schedule/Manual only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/generate-blog-post.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit & Push changes (Schedule/Manual only)
        id: commit_changes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "자동 업데이트: 공공데이터 수집 및 블로그 글 생성"
            git push origin main
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: github.event_name == 'push' || steps.commit_changes.outputs.pushed != 'true'
        run: npm run build

      - name: Validate static SEO output
        if: github.event_name == 'push' || steps.commit_changes.outputs.pushed != 'true'
        run: npm run verify:seo

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' || steps.commit_changes.outputs.pushed != 'true'
        run: npx wrangler pages deploy out --project-name=my-local-info --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify live routes and redirects
        if: github.event_name == 'push' || steps.commit_changes.outputs.pushed != 'true'
        run: npm run verify:live
        env:
          BASE_URL: https://busan-now.com
